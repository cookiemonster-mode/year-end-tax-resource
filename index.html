<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Year-End Tax Q&A</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    input { padding: 8px; width: 300px; }
    button { padding: 8px 12px; margin-left: 8px; }
    #answer { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Year-End Tax Q&A</h2>
  
  <input type="text" id="questionInput" placeholder="Ask your question (English / 日本語 / 中文)" />
  <button id="askBtn">Submit</button>
  
  <p id="answer"></p>

  <script>
    async function askQuestion() {
      const question = document.getElementById("questionInput").value;
      const answerEl = document.getElementById("answer");
      answerEl.innerText = "Thinking...";

      try {
        const response = await fetch(
          "https://cookiemonster-mode.app.n8n.cloud/webhook-test/tax-question", // webhook URL
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: question })
          }
        );

        if (!response.ok) throw new Error("Webhook returned " + response.status);

        const data = await response.json();
        answerEl.innerText = data.answer;
      } catch (err) {
        answerEl.innerText = "Error: " + err;
      }
    }

    document.getElementById("askBtn").addEventListener("click", askQuestion);
  </script>
</body>
</html>
